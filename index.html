<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BTC Paper Trading</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 16px;
      background: #050816;
      color: #f9fafb;
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 24px;
    }

    .sub {
      margin: 0 0 16px;
      color: #9ca3af;
      font-size: 14px;
    }

    .card {
      background: radial-gradient(circle at top, #111827 0, #020617 55%);
      border-radius: 16px;
      padding: 12px 14px;
      border: 1px solid #1f2937;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.8);
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid #1f2937;
      font-size: 11px;
      color: #e5e7eb;
    }

    .pill-label {
      color: #9ca3af;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .tag {
      background: #111827;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 10px;
      color: #d1d5db;
    }

    .rupee {
      font-weight: 600;
      color: #f97316;
    }

    .chart-wrapper {
      margin-top: 8px;
      margin-bottom: 6px;
      border-radius: 12px;
      border: 1px solid #111827;
      background: #020617;
      overflow: hidden;
    }

    .chart-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      padding: 8px 10px;
      gap: 8px;
      align-items: center;
    }

    .chart-title {
      font-size: 13px;
      color: #e5e7eb;
    }

    .chart-sub {
      font-size: 11px;
      color: #9ca3af;
    }

    .segmented {
      display: inline-flex;
      border-radius: 999px;
      border: 1px solid #1f2937;
      background: #020617;
      padding: 2px;
      gap: 2px;
    }

    .segmented input[type="radio"] {
      display: none;
    }

    .segmented label {
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 10px;
      color: #9ca3af;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    .segmented input[type="radio"]:checked + label {
      background: linear-gradient(to right, #0f172a, #1f2937);
      color: #f9fafb;
    }

    .chart-container {
      width: 100%;
      height: 380px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* NEW: price display under chart */
    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px 4px;
      gap: 8px;
    }

    .price-label {
      font-size: 11px;
      color: #9ca3af;
    }

    .price-value {
      font-size: 18px;
      font-weight: 600;
      color: #22c55e;
    }

    .price-sub {
      font-size: 11px;
      color: #6b7280;
    }

    @media (max-width: 640px) {
      .chart-container {
        height: 320px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>BTC PAPER TRADING</h1>
    <p class="sub">Fake INR · Real BTC price (live chart + below same live price text).</p>

    <div class="card">
      <div class="row">
        <div class="pill">
          <span class="pill-label">Account</span>
          <span class="rupee">₹100,000</span>
          <span class="tag">Demo balance</span>
        </div>
      </div>

      <div class="chart-wrapper">
        <div class="chart-header">
          <div>
            <div class="chart-title">BTC/USDT · Binance</div>
            <div class="chart-sub">TradingView live chart</div>
          </div>

          <div>
            <!-- Interval controls (visual only; TradingView iframe handle karega) -->
            <div class="segmented" aria-label="Chart interval">
              <input type="radio" name="interval" id="int-1m" checked />
              <label for="int-1m">1m</label>

              <input type="radio" name="interval" id="int-30m" />
              <label for="int-30m">30m</label>

              <input type="radio" name="interval" id="int-1h" />
              <label for="int-1h">1h</label>
            </div>
          </div>
        </div>

        <div class="chart-container">
          <!-- TradingView chart iframe (same as your live site) -->
          <iframe
            id="tv-chart"
            src="https://s.tradingview.com/widgetembed/?frameElementId=tradingview_btcusdt&symbol=BINANCE:BTCUSDT&interval=1&hidesidetoolbar=1&symboledit=1&saveimage=0&toolbarbg=f1f3f6&studies=[]&hideideas=1&theme=dark"
            title="BTCUSDT Chart">
          </iframe>
        </div>

        <!-- NEW: Live price under chart -->
        <div class="price-row">
          <div>
            <div class="price-label">Live BTC price (same as chart)</div>
            <div class="price-sub">Source: TradingView · BINANCE:BTCUSDT</div>
          </div>
          <div id="live-price" class="price-value">Loading…</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Simple JS: fetch same BTC price from public API and show below chart -->
  <script>
    const priceEl = document.getElementById("live-price");

    async function fetchPrice() {
      try {
        // Binance public API for BTCUSDT (same symbol as chart)
        const res = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");
        const data = await res.json();
        const price = parseFloat(data.price);

        // Format with commas and 2 decimals
        const formatted = price.toLocaleString("en-IN", {
          maximumFractionDigits: 2,
          minimumFractionDigits: 2
        });

        priceEl.textContent = "₹ " + formatted;
      } catch (e) {
        console.error(e);
        priceEl.textContent = "Price error";
      }
    }

    // Initial + repeat every 5 seconds
    fetchPrice();
    setInterval(fetchPrice, 5000);
  </script>
</body>
</html>
